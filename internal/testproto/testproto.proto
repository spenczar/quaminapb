syntax = "proto3";

package test;

option go_package = "github.com/spenczar/quaminapb/internal/testproto";

enum TestStatus {
  UNKNOWN = 0;
  PENDING = 1;
  ACTIVE = 2;
}

message DeepMsg {
  string leaf = 1;
}

message NestedMsg {
  string value = 1;
  int32 count = 2;
  DeepMsg deep = 3;
  map<string, string> attrs = 4;
  // parts intentionally uses field number 10, the same as TestMsg.items, to
  // exercise that the flattener's per-call fieldArrays scoping correctly
  // isolates array ID allocation at each nesting level.
  repeated DeepMsg parts = 10;
}

message TestMsg {
  int32 id = 1;
  string name = 2;
  bool flag = 3;
  float score = 4;
  double ratio = 5;
  bytes data = 6;
  TestStatus status = 7;
  NestedMsg nested = 8;
  repeated int32 tags = 9;
  repeated NestedMsg items = 10;
  map<string, string> labels = 11;
  sint32 signed_val = 12;
  uint64 big = 13;
  sfixed32 sf32 = 14;
  sfixed64 sf64 = 15;
  fixed32 f32 = 16;
  fixed64 f64 = 17;
}

// CityLots messages mirror the GeoJSON Feature shape used in the citylots
// benchmark dataset.
message CityLotProperties {
  string mapblklot = 1; string blklot    = 2; string block_num = 3;
  string lot_num   = 4; string from_st   = 5; string to_st     = 6;
  string street    = 7; string st_type   = 8; string odd_even  = 9;
}
message CityLotCoord {
  double lon  = 1;
  double lat  = 2;
  double elev = 3;
}
message CityLotRing {
  repeated CityLotCoord points = 1;
}
message CityLotGeometry {
  string            type  = 1;
  repeated CityLotRing rings = 2;
}
message CityLotFeature {
  string            type       = 1;
  CityLotProperties properties = 2;
  CityLotGeometry   geometry   = 3;
}

// Status messages mirror the Twitter-like event shape used in quamina's own
// status.json benchmark dataset.
message StatusContext {
  int64 user_id       = 1;
  int64 friends_count = 2;
}
message StatusUser {
  int64  id              = 1; string id_str         = 2;
  string name            = 3; string screen_name    = 4;
  string location        = 5; string description    = 6;
  int64  followers_count = 7; int64  friends_count  = 8;
  int64  listed_count    = 9; int64  statuses_count = 10;
  string created_at      = 11; bool   verified      = 12;
}
message StatusPayloadMetadata {
  string result_type = 1; string iso_language_code = 2;
}
message StatusPayload {
  StatusPayloadMetadata metadata       = 1;
  string                created_at     = 2;
  int64                 id             = 3;
  string                id_str         = 4;
  string                text           = 5;
  string                source         = 6;
  bool                  truncated      = 7;
  StatusUser            user           = 8;
  int64                 retweet_count  = 9;
  int64                 favorite_count = 10;
  bool                  favorited      = 11;
  bool                  retweeted      = 12;
  string                lang_value     = 13;
}
message StatusEvent {
  StatusContext context = 1;
  StatusPayload payload = 2;
}
